<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O Alquimista · Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#1a1a1a;font-family:Inter,system-ui,sans-serif}
  /* WIREFRAME visual language */
  .wf{
    --w-bg:#f5f3ee;        /* paper */
    --w-bg-2:#ebe7df;
    --w-ink:#2a2826;
    --w-ink-soft:#807c74;
    --w-rule:#c8c2b6;
    --w-rule-strong:#8a847a;
    --w-accent:#5a544a;    /* gold stand-in */
    --w-mono:'JetBrains Mono',monospace;
    --w-sans:'Inter',sans-serif;
    background:var(--w-bg);
    color:var(--w-ink);
    font-family:var(--w-sans);
    width:100%;height:100%;position:relative;overflow:hidden;
  }
  .wf *{box-sizing:border-box}
  .wf-bar{position:absolute;left:0;right:0;top:0;height:48px;border-bottom:1px solid var(--w-rule-strong);display:flex;align-items:center;padding:0 20px;gap:24px;font-family:var(--w-mono);font-size:11px;background:var(--w-bg)}
  .wf-bar .logo{font-weight:600;letter-spacing:0.06em}
  .wf-bar .logo::before{content:'●';margin-right:8px;color:var(--w-accent)}
  .wf-bar nav{display:flex;gap:18px;color:var(--w-ink-soft)}
  .wf-bar nav a.act{color:var(--w-ink);font-weight:600}
  .wf-bar .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .wf-bar .pill{border:1px solid var(--w-rule-strong);padding:5px 12px;letter-spacing:0.08em}
  .wf-bar .cta{background:var(--w-accent);color:var(--w-bg);padding:6px 14px;letter-spacing:0.1em;text-transform:uppercase}
  .wf-bar .burger{width:30px;height:24px;border:1px solid var(--w-rule-strong);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px}
  .wf-bar .burger span{width:12px;height:1px;background:var(--w-ink);display:block}

  /* primitives */
  .box{border:1px dashed var(--w-rule-strong);background:var(--w-bg-2);position:relative}
  .box.solid{border-style:solid}
  .box.fill{background:var(--w-rule)}
  .box.cross::before,.box.cross::after{content:'';position:absolute;inset:0;border-color:var(--w-rule-strong)}
  .box.cross::before{border-top:1px dashed var(--w-rule-strong);transform:rotate(0);top:0;left:0;right:0;height:100%;background:linear-gradient(to bottom right,transparent calc(50% - 1px),var(--w-rule-strong) calc(50%),transparent calc(50% + 1px));opacity:0.4}
  .box.cross::after{background:linear-gradient(to top right,transparent calc(50% - 1px),var(--w-rule-strong) calc(50%),transparent calc(50% + 1px));opacity:0.4}
  .lbl{position:absolute;font-family:var(--w-mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--w-ink-soft);background:var(--w-bg);padding:2px 6px}
  .lbl.tl{top:6px;left:6px}.lbl.tr{top:6px;right:6px}.lbl.bl{bottom:6px;left:6px}.lbl.br{bottom:6px;right:6px}
  .lbl.center{top:50%;left:50%;transform:translate(-50%,-50%);background:transparent;color:var(--w-ink);font-size:11px;letter-spacing:0.18em;font-weight:500}
  .txt-line{height:8px;background:var(--w-rule);border-radius:1px;margin-bottom:6px}
  .txt-line.h1{height:24px;background:var(--w-ink);border-radius:2px;margin-bottom:14px}
  .txt-line.h2{height:18px;background:var(--w-ink-soft);margin-bottom:10px}
  .txt-line.short{width:60%}
  .txt-line.mid{width:80%}
  .row{display:flex;gap:8px;align-items:center}
  .grid{display:grid;gap:1px;background:var(--w-rule-strong)}
  .grid > *{background:var(--w-bg-2)}
  .meta-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--w-rule-strong);border:1px solid var(--w-rule-strong)}
  .meta-strip > div{background:var(--w-bg);padding:8px 10px;font-family:var(--w-mono);font-size:9px;letter-spacing:0.14em;color:var(--w-ink-soft);text-transform:uppercase}
  .meta-strip > div .v{color:var(--w-ink);font-weight:500;margin-top:3px;display:block}
  .chip{border:1px solid var(--w-rule-strong);padding:5px 10px;font-family:var(--w-mono);font-size:9px;letter-spacing:0.08em;color:var(--w-ink-soft)}
  .chip.act{background:var(--w-accent);color:var(--w-bg);border-color:var(--w-accent)}
  .btn-w{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--w-rule-strong);padding:8px 14px;font-family:var(--w-mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--w-ink-soft)}
  .btn-w.prim{background:var(--w-accent);color:var(--w-bg);border-color:var(--w-accent)}
  .annot{position:absolute;font-family:var(--w-mono);font-size:9px;letter-spacing:0.1em;color:var(--w-accent);background:var(--w-bg);padding:2px 6px;border:1px solid var(--w-accent);border-radius:2px;pointer-events:none;z-index:5}
  .arrow{position:absolute;width:32px;height:1px;background:var(--w-accent)}
  .arrow::after{content:'';position:absolute;right:-1px;top:-3px;width:7px;height:7px;border-top:1px solid var(--w-accent);border-right:1px solid var(--w-accent);transform:rotate(45deg)}

  /* Page-specific layouts */
  /* === LANDING DESKTOP === */
  .ld{padding:48px 0 0}
  .ld .hero{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--w-rule-strong);min-height:520px}
  .ld .hero-l{padding:36px 32px;border-right:1px solid var(--w-rule-strong);display:flex;flex-direction:column;gap:18px;justify-content:space-between}
  .ld .hero-r{position:relative;background:var(--w-bg-2);display:grid;place-items:center}
  .ld .hero-r .bean{width:50%;aspect-ratio:1;border:2px dashed var(--w-rule-strong);border-radius:50%;position:relative}
  .ld .hero-r .bean::before{content:'GRÃO · SVG';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--w-mono);font-size:11px;letter-spacing:0.18em;color:var(--w-ink-soft)}
  .ld .about{padding:40px 32px;border-bottom:1px solid var(--w-rule-strong);display:grid;grid-template-columns:1fr 1fr;gap:48px}
  .ld .blend{padding:40px 32px;border-bottom:1px solid var(--w-rule-strong)}
  .ld .blend-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--w-rule-strong);border:1px solid var(--w-rule-strong);min-height:380px}
  .ld .blend-canvas{background:var(--w-bg-2);position:relative;display:grid;place-items:center}
  .ld .blend-canvas .bean{width:55%;aspect-ratio:1;border:2px dashed var(--w-rule-strong);border-radius:50%;display:grid;place-items:center;font-family:var(--w-mono);font-size:11px;letter-spacing:0.18em;color:var(--w-ink-soft)}
  .ld .builder{background:var(--w-bg);padding:24px;display:flex;flex-direction:column;gap:18px}
  .ld .builder h4{font-family:var(--w-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--w-ink-soft);margin:0 0 8px;font-weight:500}

  /* MOBILE wireframes */
  .mb-bar{height:48px;border-bottom:1px solid var(--w-rule-strong);display:flex;align-items:center;padding:0 14px;gap:10px;font-family:var(--w-mono);font-size:10px}
  .mb-bar .logo{font-weight:600;letter-spacing:0.06em}.mb-bar .logo::before{content:'●';margin-right:6px;color:var(--w-accent)}
  .mb-bar .right{margin-left:auto;display:flex;gap:8px;align-items:center}
  .mb-bar .dot{width:6px;height:6px;background:#6b8a4a;border-radius:50%}
  .mb-bar .burger{width:30px;height:24px;border:1px solid var(--w-rule-strong);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px}
  .mb-bar .burger span{width:12px;height:1px;background:var(--w-ink);display:block}

  /* Open menu state for mobile annotation */
  .mb-menu{position:absolute;left:0;right:0;top:48px;background:var(--w-bg);border-bottom:1px solid var(--w-rule-strong);padding:18px 14px;font-family:var(--w-mono);font-size:11px;display:flex;flex-direction:column;gap:0}
  .mb-menu a{padding:12px 4px;border-bottom:1px solid var(--w-rule);color:var(--w-ink-soft)}
  .mb-menu a.act{color:var(--w-ink);font-weight:600}
  .mb-menu .cta{margin-top:14px;background:var(--w-accent);color:var(--w-bg);text-align:center;padding:12px;letter-spacing:0.16em;text-transform:uppercase;font-weight:600}
</style>

<!-- React + Babel for design canvas -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
